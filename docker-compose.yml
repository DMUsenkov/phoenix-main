services:


  postgres:
    image: postgres:16-alpine
    container_name: phoenix-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phoenix}
      POSTGRES_USER: ${POSTGRES_USER:-phoenix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phoenix_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phoenix} -d ${POSTGRES_DB:-phoenix}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - phoenix-network


  minio:
    image: minio/minio:latest
    container_name: phoenix-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-phoenix}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-phoenix_secret}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - phoenix-network


  minio-init:
    image: minio/mc:latest
    container_name: phoenix-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set phoenix http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb phoenix/$${S3_BUCKET} --ignore-existing;
      mc anonymous set download phoenix/$${S3_BUCKET}/public;
      echo 'Bucket $${S3_BUCKET} created successfully';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-phoenix}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-phoenix_secret}
      S3_BUCKET: ${S3_BUCKET:-phoenix-media}
    networks:
      - phoenix-network


  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: phoenix-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:

      APP_NAME: ${APP_NAME:-Phoenix API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DEBUG: ${DEBUG:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-text}


      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-phoenix}:${POSTGRES_PASSWORD:-phoenix_secret}@postgres:5432/${POSTGRES_DB:-phoenix}

      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-phoenix}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-phoenix_secret}
      S3_BUCKET: ${S3_BUCKET:-phoenix-media}
      S3_REGION: ${S3_REGION:-us-east-1}

      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
    volumes:
      - ./apps/api:/app
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - phoenix-network


  vite:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: phoenix-vite
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_URL: ""
      VITE_APP_NAME: ${APP_NAME:-Phoenix}
      VITE_APP_VERSION: ${APP_VERSION:-0.1.0}
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    networks:
      - phoenix-network


  web:
    image: nginx:alpine
    container_name: phoenix-web
    restart: always
    depends_on:
      - vite
      - api
    volumes:
      - ./apps/web/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT:-3000}:80"
    networks:
      - phoenix-network


  web-prod:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ""
        VITE_APP_NAME: ${APP_NAME:-Phoenix}
        VITE_APP_VERSION: ${APP_VERSION:-0.1.0}
    container_name: phoenix-web-prod
    restart: always
    profiles:
      - production
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:80"
    networks:
      - phoenix-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  phoenix-network:
    driver: bridge
