


services:


  postgres:
    image: postgres:16-alpine
    container_name: phoenix-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - phoenix-network


  minio:
    image: minio/minio:latest
    container_name: phoenix-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - phoenix-network


  minio-init:
    image: minio/mc:latest
    container_name: phoenix-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set phoenix http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb phoenix/$${S3_BUCKET} --ignore-existing;
      mc anonymous set download phoenix/$${S3_BUCKET}/public;
      echo 'Bucket $${S3_BUCKET} created successfully';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    networks:
      - phoenix-network


  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: phoenix-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      APP_NAME: ${APP_NAME:-Phoenix API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: "false"
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      LOG_FORMAT: json
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TTL_MIN: ${JWT_ACCESS_TTL_MIN:-30}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      CORS_ORIGINS: ${CORS_ORIGINS}
    networks:
      - phoenix-network


  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ""
        VITE_APP_NAME: ${APP_NAME:-Phoenix}
        VITE_APP_VERSION: ${APP_VERSION:-1.0.0}
    container_name: phoenix-web
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks:
      - phoenix-network


  nginx:
    image: nginx:alpine
    container_name: phoenix-nginx
    restart: always
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - ./infra/certbot/www:/var/www/certbot:ro
    networks:
      - phoenix-network
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''


  certbot:
    image: certbot/certbot
    container_name: phoenix-certbot
    restart: unless-stopped
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  phoenix-network:
    driver: bridge
