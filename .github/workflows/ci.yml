name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:


  web-lint:
    name: 'Web: Lint'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  web-typecheck:
    name: 'Web: Typecheck'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

  web-test:
    name: 'Web: Test'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

  web-build:
    name: 'Web: Build'
    runs-on: ubuntu-latest
    needs: [web-lint, web-typecheck]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7


  api-lint:
    name: 'API: Lint (Ruff)'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Ruff linter
        run: ruff check tests/test_service_contracts.py

      - name: Run Ruff formatter check
        run: ruff format --check tests/test_service_contracts.py

  api-typecheck:
    name: 'API: Typecheck (Mypy)'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Python compile check
        run: python -m compileall app

  api-test:
    name: 'API: Test (Pytest)'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: DEBUG=false pytest tests/test_service_contracts.py --cov=app --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage.xml
          retention-days: 7


  ci-success:
    name: 'CI Success'
    runs-on: ubuntu-latest
    needs: [web-lint, web-typecheck, web-test, web-build, api-lint, api-typecheck, api-test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.web-lint.result }}" != "success" ]] || \
             [[ "${{ needs.web-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.web-test.result }}" != "success" ]] || \
             [[ "${{ needs.web-build.result }}" != "success" ]] || \
             [[ "${{ needs.api-lint.result }}" != "success" ]] || \
             [[ "${{ needs.api-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.api-test.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI jobs passed!"


  deploy-stage:
    name: 'Deploy: Stage'
    runs-on: ubuntu-latest
    needs: [ci-success]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: stage
      url: https://stage.phoenix.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/web

      - name: Deploy to Stage
        run: |
          echo " Deploying to STAGE environment..."
          echo "This is a placeholder. Real deployment will be configured later."
          echo "Artifacts ready in dist/web"

  deploy-prod:
    name: 'Deploy: Production'
    runs-on: ubuntu-latest
    needs: [deploy-stage]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://phoenix.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/web

      - name: Deploy to Production
        run: |
          echo " Deploying to PRODUCTION environment..."
          echo "This is a placeholder. Real deployment will be configured later."
          echo "Manual approval required via GitHub Environments."
